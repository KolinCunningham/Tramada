<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tramada Replica - Test Harness</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-tramada-replica="true">
    <div class="page-frame">
      <header class="top-band">
        <div class="session-line">
          <span>You are logged in as Clementine For Mosman Travel</span>
          <span class="save-status" id="saveStatus">Starting local save...</span>
          <button class="link-button" type="button" id="logoutButton">Logout</button>
        </div>
        <div class="brand-row">
          <nav class="primary-nav" aria-label="Primary">
            <button type="button" data-view="home">Home</button>
            <button type="button" data-view="bookings">Bookings</button>
            <button type="button" data-view="clients">Clients</button>
            <button type="button" data-view="creditors">Creditors</button>
            <button type="button" data-view="debtors">Debtors</button>
            <button type="button" data-view="reports">Reports</button>
          </nav>
          <div class="brand-mark" aria-label="tramada">
            <span class="brand-box"></span>
            <span class="brand-name">tramada</span>
            <span class="brand-tag">smart.simple.seamless</span>
          </div>
        </div>
      </header>

      <div class="app-layout">
        <aside class="left-rail" aria-label="Booking navigation">
          <section class="booking-card" id="bookingCard"></section>
          <section class="sidebar-menu" id="sidebarMenu"></section>
        </aside>
        <main class="work-area" id="workArea" tabindex="-1"></main>
      </div>
    </div>

    <div class="status-toast" id="statusToast" role="status" aria-live="polite"></div>
    <script src="./script.js"></script>
  </body>
</html>
